name: Feature request
description: Propose a focused product improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user outcome is currently difficult or impossible?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed experience
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Data impact
      options:
        - label: I described any new data collected, shared, or sent off-device.
          required: true
