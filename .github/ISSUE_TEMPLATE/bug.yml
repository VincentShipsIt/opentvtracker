name: Bug report
description: Report a reproducible OpenTV problem without private viewing data
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Do not include share URLs, private notes, account identifiers, or credentials.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: OpenTV and iOS versions
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options: [Today, Discover, Cinemas, Together, Library, Import or export, Other]
    validations:
      required: true
