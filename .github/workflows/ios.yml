name: iOS

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode with an installed iOS runtime
        run: sudo xcode-select -s /Applications/Xcode_26.4.1.app
      - name: Show toolchain
        run: xcodebuild -version
      - name: Validate privacy manifest
        run: plutil -lint OpenTVTracker/Resources/PrivacyInfo.xcprivacy
      - name: Build and test
        run: >-
          xcodebuild test
          -project OpenTVTracker.xcodeproj
          -scheme OpenTVTracker
          -destination 'platform=iOS Simulator,name=iPhone 17 Pro,OS=latest'
          -derivedDataPath "$RUNNER_TEMP/DerivedData"
          -resultBundlePath "$RUNNER_TEMP/OpenTVTrackerTests.xcresult"
          CODE_SIGNING_ALLOWED=NO
      - name: Upload failed test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: opentvtracker-test-diagnostics-${{ github.run_attempt }}
          path: ${{ runner.temp }}/OpenTVTrackerTests.xcresult
          if-no-files-found: ignore
          retention-days: 7
