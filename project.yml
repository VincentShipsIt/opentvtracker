name: OpenTVTracker
options:
  bundleIdPrefix: dev.opentvtracker
  deploymentTarget:
    iOS: "26.0"
  generateEmptyDirectories: true
  groupSortPosition: top
settings:
  base:
    CURRENT_PROJECT_VERSION: 2
    DEVELOPMENT_TEAM: C76R5DRH64
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO
    MARKETING_VERSION: 0.1.0
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_VERSION: 6.0
packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: 0.9.20
targets:
  OpenTVTracker:
    type: application
    platform: iOS
    configFiles:
      Debug: Config/Base.xcconfig
      Release: Config/Base.xcconfig
    sources:
      - path: OpenTVTracker
    resources:
      - path: OpenTVTracker/Resources/Assets.xcassets
      - path: OpenTVTracker/Resources/PrivacyInfo.xcprivacy
    info:
      path: Config/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleDisplayName: OpenTV Tracker
        ITSAppUsesNonExemptEncryption: false
        CKSharingSupported: true
        LSApplicationCategoryType: public.app-category.entertainment
        NSBonjourServices:
          - _opentv-pair._tcp
        NSLocalNetworkUsageDescription: OpenTV uses the local network only when you choose to pair with your partner's nearby iPhone.
        NSMicrophoneUsageDescription: OpenTV uses the microphone only while you speak a request for your next movie or show.
        NSSpeechRecognitionUsageDescription: OpenTV turns your spoken discovery request into text so it can find matching movies and shows.
        OpenTVAPIBaseURL: $(CATALOG_PROXY_BASE_URL)
        OpenRouterModel: $(OPENROUTER_MODEL)
        OpenRouterOAuthCallbackURL: $(OPENROUTER_OAUTH_CALLBACK_URL)
        OpenRouterSiteURL: $(OPENROUTER_SITE_URL)
        OpenTVAppAttestDevelopmentToken: $(APP_ATTEST_DEVELOPMENT_TOKEN)
        UIBackgroundModes:
          - remote-notification
        UILaunchScreen: {}
    settings:
      base:
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Config/OpenTVTracker.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: dev.opentvtracker.app
        TARGETED_DEVICE_FAMILY: 1
      configs:
        Debug:
          APP_ATTEST_ENVIRONMENT: development
          PUSH_NOTIFICATIONS_ENVIRONMENT: development
        Release:
          APP_ATTEST_ENVIRONMENT: production
          PUSH_NOTIFICATIONS_ENVIRONMENT: production
    attributes:
      SystemCapabilities:
        com.apple.iCloud:
          enabled: 1
        com.apple.Push:
          enabled: 1
        com.apple.DeviceCheck:
          enabled: 1
    dependencies:
      - package: ZIPFoundation
  OpenTVTrackerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OpenTVTrackerTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: dev.opentvtracker.app.tests
    dependencies:
      - target: OpenTVTracker
      - package: ZIPFoundation
  OpenTVTrackerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: OpenTVTrackerUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: dev.opentvtracker.app.uitests
    dependencies:
      - target: OpenTVTracker
schemes:
  OpenTVTracker:
    build:
      targets:
        OpenTVTracker: all
        OpenTVTrackerTests: [test]
        OpenTVTrackerUITests: [test]
    test:
      gatherCoverageData: true
      targets:
        - name: OpenTVTrackerTests
        - name: OpenTVTrackerUITests
    run:
      config: Debug
    archive:
      config: Release
